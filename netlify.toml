[build]
  command = "pnpm install --no-frozen-lockfile && pnpm exec vite build"
  publish = "dist/public"
  functions = "netlify/functions"
  image = "noble"

[functions]
  node_bundle = "esbuild"
  # Change to ESM to support import.meta
  directory = "netlify/functions"
  node_format = "esm"
  external_node_modules = [
    "pg", 
    "mysql2", 
    "vite", 
    "@tailwindcss/vite", 
    "@builder.io/vite-plugin-jsx-loc", 
    "vite-plugin-manus-runtime",
    "lightningcss",
    "@tailwindcss/oxide",
    "@babel/core",
    "@babel/preset-typescript"
  ]

[functions.api]
  included_files = ["dist/public/index.html"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

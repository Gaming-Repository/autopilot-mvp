[build]
  command = "pnpm install --no-frozen-lockfile && pnpm exec vite build"
  publish = "dist/public"
  functions = "netlify/functions"
  image = "noble"

[functions]
  node_bundle = "esbuild"
  directory = "netlify/functions"
  node_format = "esm"
  # Mark all native/build-time modules as external to avoid bundling errors
  external_node_modules = [
    "pg", 
    "mysql2", 
    "vite", 
    "@tailwindcss/vite", 
    "@builder.io/vite-plugin-jsx-loc", 
    "vite-plugin-manus-runtime",
    "lightningcss",
    "@tailwindcss/oxide",
    "@babel/core",
    "@babel/preset-typescript"
  ]

[functions.api]
  # Ensure the built frontend is available to the function if needed
  included_files = ["dist/public/**"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build]
  command = "pnpm install --no-frozen-lockfile && pnpm exec vite build"
  publish = "dist/public"
  functions = "netlify/functions"
  image = "noble"

[functions]
  node_bundle = "esbuild"
  external_node_modules = ["pg", "mysql2"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
